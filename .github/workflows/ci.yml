name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.5
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Android TWA validation
        run: pnpm android:twa:validate

  vps-compose:
    name: VPS compose config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Render Playground VPS compose config
        shell: bash
        run: |
          set -euo pipefail
          set -a
          . ./.env.vps.example
          set +a
          export HANA_ENV_FILE=.env.vps.example
          docker compose \
            -f docker-compose.vps.yml \
            -f infra/deploy/playground/docker-compose.playground.yml \
            --project-name hana-chat-vps \
            config >/tmp/hana-chat-vps-compose.yml
