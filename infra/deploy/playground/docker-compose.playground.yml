services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL, for example https://app.hanachat.site}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL, for example https://hanachat.site}
    restart: unless-stopped
    env_file:
      - ${HANA_ENV_FILE:?Set HANA_ENV_FILE to the production env file}
    environment:
      API_GATEWAY_URL: http://api-gateway:4000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL, for example https://app.hanachat.site}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL, for example https://hanachat.site}
      ANDROID_APK_DOWNLOAD_URL: ${ANDROID_APK_DOWNLOAD_URL:-}
      ANDROID_TWA_PACKAGE_ID: ${ANDROID_TWA_PACKAGE_ID:-com.hanachat.app}
      ANDROID_TWA_SHA256_CERT_FINGERPRINTS: ${ANDROID_TWA_SHA256_CERT_FINGERPRINTS:-}
      PORT: 3000
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    volumes:
      - ${ANDROID_DOWNLOADS_PATH:-/opt/hana-chat/shared/android-downloads}:/app/apps/web/public/downloads:ro
    networks:
      - hana-internal
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    env_file:
      - ${HANA_ENV_FILE:?Set HANA_ENV_FILE to the production env file}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/deploy/playground/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CERTBOT_WEBROOT_PATH:-/opt/hana-chat/shared/certbot-webroot}:/srv/certbot-webroot:ro
      - ${LETSENCRYPT_PATH:-/opt/hana-chat/shared/letsencrypt}:/etc/letsencrypt:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - hana-internal
    depends_on:
      api-gateway:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
