  temporal-ui:
    image: temporalio/ui:2.42.1
    restart: unless-stopped
    profiles: ["ops"]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${WEB_ORIGIN:-https://app.hanachat.live}
    ports:
