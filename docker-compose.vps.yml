      KAFKA_BROKERS: redpanda:9092
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - hana-internal
    depends_on:
      redpanda:
        condition: service_healthy

networks:
  hana-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redpanda_data:
  clickhouse_data:
  temporal_postgres_data:
  media_data:
